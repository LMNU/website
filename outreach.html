<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outreach — Laura Nurski</title>
<meta name="description" content="Podcasts, blog posts, media appearances, and public talks by Laura Nurski on AI and the future of work.">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:      #007074;
    --teal-mid:  #005c60;
    --dark:      #111;
    --mid:       #555;
    --warm:      #f9f7f4;
    --border:    #e8e8e8;
    --sans:      'Inter', system-ui, sans-serif;
    --serif:     'Georgia', serif;
  }

  body { font-family: var(--sans); color: var(--dark); background: #fff; line-height: 1.6; }

  /* ── Nav ─────────────────────────────────────────────────────── */
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%; height: 64px;
    background: #fff; border-bottom: 1px solid var(--border);
  }
  .nav-name { font-size: 1.05rem; font-weight: 700; color: var(--dark); text-decoration: none; }
  .nav-links { display: flex; gap: 2.2rem; }
  .nav-links a { font-size: .875rem; color: var(--mid); text-decoration: none; font-weight: 500; }
  .nav-links a:hover, .nav-links a.active { color: var(--teal); }

  /* ── Page header ─────────────────────────────────────────────── */
  .page-header {
    padding: 52px 5% 36px;
    border-bottom: 1px solid var(--border);
    max-width: 1160px; margin: 0 auto;
  }
  .page-header h1 {
    font-family: var(--serif); font-weight: normal;
    font-size: clamp(1.6rem, 3vw, 2.4rem); line-height: 1.2;
    margin-bottom: .5rem;
  }
  .page-header p { font-size: .95rem; color: var(--mid); max-width: 600px; }

  /* ── Type tabs ───────────────────────────────────────────────── */
  .tabs-wrap {
    padding: 0 5%;
    border-bottom: 1px solid var(--border);
  }
  .tabs {
    max-width: 1160px; margin: 0 auto;
    display: flex; gap: 0;
  }
  .tab-btn {
    font-family: var(--sans); font-size: .85rem; font-weight: 500;
    padding: 1rem 1.4rem;
    border: none; background: none; cursor: pointer;
    color: var(--mid);
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--teal); }
  .tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); }

  /* ── Publication list (same card grid as research) ───────────── */
  .pub-section { padding: 40px 5%; max-width: 1160px; margin: 0 auto; }
  .pub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
  .pub-card { text-decoration: none; color: inherit; display: block; }
  .pub-cover-wrap {
    position: relative; overflow: hidden;
    border: 1px solid var(--border); margin-bottom: .7rem;
    background: var(--warm);
    aspect-ratio: 210/297;
  }
  .pub-cover-wrap img {
    display: block; width: 100%; height: 100%; object-fit: contain;
    transition: opacity .3s;
  }
  .pub-card:hover .pub-cover-wrap img { opacity: .85; }
  .pub-tag {
    position: absolute; top: .5rem; left: .5rem;
    background: #fff; border: 1px solid var(--border);
    font-size: .6rem; letter-spacing: .06em; text-transform: uppercase;
    padding: .15rem .45rem; color: var(--teal);
  }
  .pub-title { font-size: .86rem; font-weight: 600; line-height: 1.4; margin-bottom: .25rem; }
  .pub-meta { font-size: .76rem; color: var(--mid); }

  .no-results {
    padding: 3rem 0; text-align: center;
    color: var(--mid); font-size: .95rem;
    display: none;
  }

  /* ── Footer ──────────────────────────────────────────────────── */
  footer {
    padding: 1.8rem 5%; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: .8rem; color: var(--mid); margin-top: 2rem;
  }
  footer a { color: var(--mid); text-decoration: none; }
  footer a:hover { color: var(--teal); }
  .footer-links { display: flex; gap: 1.5rem; }
</style>
</head>
<body>

<!-- Nav -->
<nav>
  <a class="nav-name" href="index.html">Laura Nurski</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="research.html">Research</a>
    <a href="outreach.html" class="active">Outreach</a>
    <a href="about.html">About</a>
  </div>
</nav>

<!-- Page header -->
<div class="page-header">
  <h1>Outreach</h1>
  <p>Podcasts, blog posts, magazine and newspaper pieces, conference talks, and other public-facing work — in English and Dutch.</p>
</div>

<!-- Type tabs -->
<div class="tabs-wrap">
  <div class="tabs" id="tab-bar">
    <button class="tab-btn active" data-type="all">All</button>
    <!-- additional tabs built by JS -->
  </div>
</div>

<!-- Publication list -->
<section class="pub-section">
  <div class="pub-grid" id="pub-grid"></div>
  <p class="no-results" id="no-results">No items match the current filter.</p>
</section>

<!-- Footer -->
<footer>
  <span>© 2026 Laura Nurski</span>
  <div class="footer-links">
    <a href="https://www.linkedin.com/in/lauranurski" target="_blank" rel="noopener">LinkedIn</a>
    <a href="https://scholar.google.com/citations?user=cryM1s4AAAAJ&hl=en" target="_blank" rel="noopener">Google Scholar</a>
    <a href="https://orcid.org/0000-0003-1085-730X" target="_blank" rel="noopener">ORCID</a>
    <a href="https://bsky.app/profile/lauranurski.bsky.social" target="_blank" rel="noopener">Bluesky</a>
    <a href="about.html#contact">Contact</a>
  </div>
</footer>

<script>
  const TYPE_LABELS = {
    magazineArticle: 'Magazine',
    newspaperArticle: 'Newspaper',
    podcast: 'Podcast',
    blogPost: 'Blog post',
    presentation: 'Presentation',
    conferencePaper: 'Conference paper',
  };
  const OUTREACH_TYPES = ['magazineArticle','newspaperArticle','podcast','blogPost','presentation'];

  function typeLabel(t) {
    return TYPE_LABELS[t] || t.charAt(0).toUpperCase() + t.slice(1);
  }
  function pubHref(p) {
    return (p.url_or_download === 'download' && p.pdf) ? p.pdf : (p.url || '#');
  }
  function pubYear(p) { return p.date ? p.date.slice(0, 4) : 'n.d.'; }

  let allPubs = [];
  let activeType = 'all';

  function render() {
    const pubs = activeType === 'all'
      ? allPubs
      : allPubs.filter(p => p.type === activeType);

    const grid = document.getElementById('pub-grid');
    const noResults = document.getElementById('no-results');

    if (pubs.length === 0) {
      grid.innerHTML = '';
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';

    grid.innerHTML = pubs.map(p => `
      <a class="pub-card" href="${pubHref(p)}" target="_blank" rel="noopener">
        <div class="pub-cover-wrap">
          <img src="${p.cover_image}" alt="${p.title}" loading="lazy">
          <span class="pub-tag">${typeLabel(p.type)}</span>
        </div>
        <p class="pub-title">${p.title}</p>
        <p class="pub-meta">${[p.source, pubYear(p)].filter(Boolean).join(' · ')}</p>
      </a>`).join('');
  }

  function buildTabs(pubs) {
    const types = [...new Set(pubs.map(p => p.type))];
    const bar = document.getElementById('tab-bar');
    types.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn';
      btn.dataset.type = t;
      btn.textContent = typeLabel(t);
      bar.appendChild(btn);
    });
    bar.addEventListener('click', e => {
      if (!e.target.matches('.tab-btn')) return;
      bar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      activeType = e.target.dataset.type;
      render();
    });
  }

  fetch('publications.json')
    .then(r => r.json())
    .then(pubs => {
      allPubs = pubs.filter(p => OUTREACH_TYPES.includes(p.type));
      buildTabs(allPubs);
      render();
    })
    .catch(err => console.error('Could not load publications.json:', err));
</script>

</body>
</html>
